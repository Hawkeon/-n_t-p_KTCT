<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinh Tế Chính Trị Mác - Lênin | Ôn Tập Trắc Nghiệm</title>
  <style>
    /* ===== THEME VARIABLES ===== */
    :root, [data-theme="dark"] {
      --bg: #0f0f14;
      --bg-card: #1a1a24;
      --bg-card-hover: #222230;
      --bg-input: #14141e;
      --border: #2a2a3a;
      --border-hover: #555;
      --text: #e8e8f0;
      --text-secondary: #888;
      --text-dim: #666;
      --primary: #a8e6cf;
      --primary-hover: #8fd9b3;
      --primary-text: #0f0f14;
      --danger: #ff8b94;
      --danger-bg: rgba(255,139,148,0.1);
      --warning: #ffd93d;
      --success-bg: rgba(168,230,207,0.1);
      --btn-bg: #1e1e28;
      --btn-bg-hover: #333;
      --btn-disabled: #333;
      --btn-text-disabled: #666;
      --progress-bg: #1e1e28;
      --progress-fill: linear-gradient(90deg, #a8e6cf, #ffd93d);
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
      --star-color: #ffd93d;
    }

    [data-theme="light"] {
      --bg: #f5f5f7;
      --bg-card: #ffffff;
      --bg-card-hover: #f0f0f4;
      --bg-input: #eeeeef;
      --border: #e0e0e5;
      --border-hover: #b0b0b5;
      --text: #1a1a2e;
      --text-secondary: #666;
      --text-dim: #999;
      --primary: #2d9c6a;
      --primary-hover: #238552;
      --primary-text: #fff;
      --danger: #d94a5a;
      --danger-bg: rgba(217,74,90,0.08);
      --warning: #c28400;
      --success-bg: rgba(45,156,106,0.08);
      --btn-bg: #e8e8ec;
      --btn-bg-hover: #d8d8dc;
      --btn-disabled: #e0e0e0;
      --btn-text-disabled: #aaa;
      --progress-bg: #e8e8ec;
      --progress-fill: linear-gradient(90deg, #2d9c6a, #c28400);
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --star-color: #c28400;
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background-color 0.35s ease, color 0.35s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 20px 16px 40px; }

    /* ===== HEADER ===== */
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    header p { color: var(--text-secondary); font-size: 0.8rem; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary); cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; line-height: 1;
    }
    .icon-btn:hover { border-color: var(--border-hover); color: var(--text); background: var(--btn-bg); }

    /* ===== KEYBOARD HINTS ===== */
    .kbd-hints {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 16px; font-size: 0.7rem; color: var(--text-dim);
    }
    .kbd-hints.hidden { display: none; }
    .kbd { display: inline-block; padding: 1px 6px; border: 1px solid var(--border);
           border-radius: 4px; font-family: monospace; font-size: 0.7rem;
           background: var(--bg-input); min-width: 20px; text-align: center; }

    /* ===== STATS BAR ===== */
    .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; transition: color 0.2s; }
    .stat-value.total { color: var(--warning); }
    .stat-value.correct { color: var(--primary); }
    .stat-value.wrong { color: var(--danger); }
    .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

    /* ===== PROGRESS BAR ===== */
    .progress-bar { background: var(--progress-bg); border-radius: 6px; height: 6px; margin-bottom: 16px; overflow: hidden; }
    .progress-fill { background: var(--progress-fill); height: 100%; border-radius: 6px; transition: width 0.35s ease; }

    /* ===== MODE TOGGLE ===== */
    .mode-toggle { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
    .mode-btn {
      padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--text-secondary); cursor: pointer;
      font-size: 0.8rem; transition: all 0.2s; min-width: 44px; min-height: 36px;
    }
    .mode-btn.active { background: var(--btn-bg); color: var(--text); border-color: var(--primary); }
    .mode-btn:hover:not(.active) { border-color: var(--border-hover); }

    /* ===== SEARCH ===== */
    .search-wrap { margin-bottom: 12px; position: relative; }
    .search-input {
      width: 100%; padding: 10px 14px 10px 36px; border: 1px solid var(--border);
      border-radius: 10px; background: var(--bg-input); color: var(--text);
      font-size: 0.85rem; outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--primary); }
    .search-input::placeholder { color: var(--text-dim); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.85rem; }
    .search-info { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }

    /* ===== CHAPTER FILTER ===== */
    .chapter-filter { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
    .chapter-btn {
      padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--text-secondary); cursor: pointer;
      font-size: 0.7rem; transition: all 0.2s; min-height: 32px;
    }
    .chapter-btn.active { background: var(--btn-bg); color: var(--text); border-color: var(--primary); }
    .chapter-btn:hover:not(.active) { border-color: var(--border-hover); }
    .chapter-count { font-size: 0.65rem; opacity: 0.7; }

    /* ===== CHAPTER PROGRESS ===== */
    .chapter-progress { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center; }
    .cp-item {
      display: flex; align-items: center; gap: 6px; padding: 4px 8px;
      border-radius: 6px; cursor: pointer; font-size: 0.7rem; color: var(--text-secondary);
      transition: background 0.2s; border: 1px solid transparent;
    }
    .cp-item:hover { background: var(--btn-bg); border-color: var(--border); }
    .cp-label { min-width: 22px; font-weight: 600; }
    .cp-bar { width: 50px; height: 4px; background: var(--progress-bg); border-radius: 2px; overflow: hidden; }
    .cp-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.35s ease; }
    .cp-pct { min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

    /* ===== QUESTION CARD ===== */
    .question-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px; margin-bottom: 14px;
      transition: background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.2s;
      box-shadow: var(--shadow); position: relative;
    }
    .question-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 8px; }
    .question-id { font-size: 0.72rem; color: var(--text-dim); }
    .question-text { font-size: 1.05rem; line-height: 1.65; margin-bottom: 18px; }
    .bookmark-btn {
      background: none; border: none; cursor: pointer; font-size: 1.25rem;
      color: var(--border); transition: color 0.2s, transform 0.2s; padding: 4px;
      flex-shrink: 0; min-width: 32px; min-height: 32px;
    }
    .bookmark-btn.bookmarked { color: var(--star-color); }
    .bookmark-btn:hover { transform: scale(1.2); }

    /* ===== OPTIONS ===== */
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option {
      padding: 12px 15px; border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.2s; font-size: 0.92rem;
      background: transparent; color: var(--text); text-align: left;
      min-height: 44px; display: flex; align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    .option:hover:not(.disabled) { border-color: var(--border-hover); background: var(--bg-card-hover); }
    .option.correct { border-color: var(--primary); background: var(--success-bg); color: var(--primary); }
    .option.wrong { border-color: var(--danger); background: var(--danger-bg); color: var(--danger); }
    .option.disabled { cursor: default; }
    .option-letter {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid currentColor;
      margin-right: 10px; font-size: 0.78rem; flex-shrink: 0; font-weight: 600;
    }
    .option.correct .option-letter { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
    .option.wrong .option-letter { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ===== BUTTONS ===== */
    .btn-group { display: flex; gap: 10px; margin-top: 16px; }
    .btn {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      min-height: 44px;
    }
    .btn-primary { background: var(--primary); color: var(--primary-text); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { background: var(--btn-disabled); color: var(--btn-text-disabled); cursor: not-allowed; }
    .btn-secondary { background: var(--btn-bg); color: var(--text); }
    .btn-secondary:hover { background: var(--btn-bg-hover); }

    /* ===== NAVIGATION ===== */
    .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .nav-btn {
      padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--text-secondary); cursor: pointer;
      font-size: 0.82rem; transition: all 0.2s; min-height: 40px; min-width: 44px;
    }
    .nav-btn:hover:not(:disabled) { border-color: var(--border-hover); color: var(--text); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===== QUIZ RESULT ===== */
    .result-card { text-align: center; padding: 32px 24px; }
    .result-pct { font-size: 3.5rem; font-weight: 800; margin-bottom: 4px; }
    .result-pct.pass { color: var(--primary); }
    .result-pct.fail { color: var(--warning); }
    .result-detail { color: var(--text-secondary); margin-bottom: 8px; font-size: 0.9rem; }
    .result-breakdown { text-align: left; margin: 16px 0; }
    .rb-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
    .rb-row:last-child { border-bottom: none; }
    .timer-display { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; }

    /* ===== LOADING / ERROR ===== */
    .loading { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .loading-spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border);
                        border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 40px 20px; color: var(--danger); }
    .retry-btn { margin-top: 12px; padding: 8px 20px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .container { padding: 12px 10px 32px; }
      .question-card { padding: 15px; border-radius: 12px; }
      .question-text { font-size: 0.98rem; }
      .option { padding: 11px 13px; font-size: 0.88rem; }
      .stats { gap: 14px; }
      .stat-value { font-size: 1.3rem; }
      .btn { padding: 10px; font-size: 0.84rem; }
      .chapter-filter { gap: 4px; }
      .chapter-btn { padding: 4px 8px; font-size: 0.68rem; }
      .chapter-progress { gap: 3px; }
      .cp-bar { width: 36px; }
      .mode-btn { padding: 6px 11px; font-size: 0.76rem; }
      .result-pct { font-size: 2.6rem; }
    }
    @media (min-width: 481px) and (max-width: 768px) {
      .container { max-width: 620px; padding: 18px 14px 36px; }
    }
    @media (min-width: 1200px) {
      .container { max-width: 800px; }
      .question-text { font-size: 1.12rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>Kinh Tế Chính Trị Mác - Lênin</h1>
      <p id="question-count">Đang tải...</p>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="kbd-toggle" title="Phím tắt" aria-label="Hiện/ẩn phím tắt">⌨</button>
      <button class="icon-btn" id="theme-toggle" title="Đổi giao diện" aria-label="Đổi giao diện sáng/tối">🌙</button>
    </div>
  </header>

  <div class="kbd-hints" id="kbd-hints">
    <span><span class="kbd">1</span>-<span class="kbd">4</span> Chọn đáp án</span>
    <span><span class="kbd">←</span><span class="kbd">→</span> Trước/Sau</span>
    <span><span class="kbd">Space</span> Tiếp</span>
    <span><span class="kbd">F</span> Lật thẻ</span>
  </div>

  <div id="app-chrome"></div>
  <div id="question-area">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>Đang tải câu hỏi...</div>
    </div>
  </div>
</div>

<script>
(function() {
'use strict';

// ── CONSTANTS ──
const STORAGE_KEY = 'quiz_ktct_v2';
const STORAGE_VERSION = 1;
const labels = ['A','B','C','D'];

const chapterNames = {
  0: 'Chưa phân loại',
  1: 'C1: Đối tượng, phương pháp',
  2: 'C2: Hàng hóa, tiền tệ',
  3: 'C3: Giá trị thặng dư',
  4: 'C4: Cạnh tranh, độc quyền',
  5: 'C5: KTTT định hướng XHCN',
  6: 'C6: Hội nhập KTQT',
};

// ── STATE ──
let state = {
  mode: 'study',          // 'study' | 'flash' | 'quiz'
  currentIndex: 0,
  selectedAnswer: null,
  answers: {},            // { qid: 'A'|'B'|'C'|'D'|'viewed'|'wrong' }
  bookmarks: [],          // [qid, ...]
  allQuestions: [],
  filteredQuestions: [],
  shuffledQuestions: [],
  selectedChapter: null,  // null = all
  quizComplete: false,
  wrongAnswerIds: [],     // quiz mode wrong answers (IDs)
  quizStartTime: null,    // quiz timer
  quizElapsed: 0,
  searchQuery: '',
};

// DOM refs (populated after renderChrome)
let dom = {};

// ── UTILS ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function getChapters(questions) {
  const s = new Set();
  questions.forEach(q => s.add(q.chapter));
  return [...s].sort((a, b) => a - b);
}

function getChapterCounts() {
  const c = {};
  state.allQuestions.forEach(q => { c[q.chapter] = (c[q.chapter] || 0) + 1; });
  return c;
}

function calculateStats() {
  const qMap = {};
  state.allQuestions.forEach(q => { qMap[q.id] = q; });
  let answered = 0, correct = 0;
  for (const [qid, ans] of Object.entries(state.answers)) {
    if (ans === 'viewed' || ans === 'wrong') { answered++; continue; }
    answered++;
    const q = qMap[qid];
    if (q && ans === q.answer) correct++;
  }
  return { answered, correct, wrong: answered - correct };
}

function chapterProgress(chapter) {
  const qMap = {};
  state.allQuestions.forEach(q => { qMap[q.id] = q; });
  const chapterIds = state.allQuestions.filter(q => q.chapter === chapter).map(q => q.id);
  const answered = chapterIds.filter(id => state.answers[id] && state.answers[id] !== 'viewed' && state.answers[id] !== 'wrong').length;
  return { answered, total: chapterIds.length };
}

// ── LOCALSTORAGE ──
let saveTimeout;
function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    try {
      const data = {
        version: STORAGE_VERSION,
        theme: document.documentElement.dataset.theme,
        mode: state.mode,
        selectedChapter: state.selectedChapter,
        currentIndex: state.currentIndex,
        answers: state.answers,
        bookmarks: state.bookmarks,
        quizComplete: state.quizComplete,
        wrongAnswerIds: state.wrongAnswerIds,
        quizElapsed: state.quizElapsed,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) { /* ignore */ }
  }, 300);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.version !== STORAGE_VERSION) return;
    return saved;
  } catch(e) { return null; }
}

function hydrateState(saved) {
  if (!saved) return;
  // Theme
  if (saved.theme === 'dark' || saved.theme === 'light') {
    setTheme(saved.theme);
  }
  // State
  state.mode = saved.mode || 'study';
  state.selectedChapter = saved.selectedChapter ?? null;
  state.answers = saved.answers || {};
  state.bookmarks = saved.bookmarks || [];
  state.quizComplete = saved.quizComplete || false;
  state.wrongAnswerIds = saved.wrongAnswerIds || [];
  state.quizElapsed = saved.quizElapsed || 0;
  // Restore position after data loads
  state._restoreIndex = saved.currentIndex || 0;
  state._restoreMode = saved.mode || 'study';
}

// ── THEME ──
function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'dark' ? '🌙' : '☀️';
}

function toggleTheme() {
  const current = document.documentElement.dataset.theme;
  setTheme(current === 'dark' ? 'light' : 'dark');
  saveState();
}

// ── RENDER: CHROME ──
function renderChrome() {
  const appChrome = document.getElementById('app-chrome');
  if (!appChrome) return;

  const chapters = getChapters(state.allQuestions);
  const counts = getChapterCounts();
  const stats = calculateStats();
  const total = state.shuffledQuestions.length;
  const modeLabels = {
    study:  { answered: 'Đã trả lời', correct: 'Đúng', wrong: 'Sai' },
    flash:  { answered: 'Đã ôn',     correct: 'Nhớ',  wrong: 'Chưa nhớ' },
    quiz:   { answered: 'Đã làm',    correct: 'Đúng', wrong: 'Sai' },
  };
  const ml = modeLabels[state.mode] || modeLabels.study;

  appChrome.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-value total" id="stat-answered">${stats.answered}/${total}</div><div class="stat-label">${ml.answered}</div></div>
      <div class="stat"><div class="stat-value correct" id="stat-correct">${stats.correct}</div><div class="stat-label">${ml.correct}</div></div>
      <div class="stat"><div class="stat-value wrong" id="stat-wrong">${stats.wrong}</div><div class="stat-label">${ml.wrong}</div></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:${total > 0 ? (stats.answered/total)*100 : 0}%"></div></div>

    <div class="mode-toggle">
      <button class="mode-btn ${state.mode === 'study' ? 'active' : ''}" onclick="switchMode('study')">📖 Học</button>
      <button class="mode-btn ${state.mode === 'flash' ? 'active' : ''}" onclick="switchMode('flash')">🃏 Đố ôn</button>
      <button class="mode-btn ${state.mode === 'quiz' ? 'active' : ''}" onclick="switchMode('quiz')">📝 Kiểm tra</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="Tìm kiếm câu hỏi..." value="${escapeHtml(state.searchQuery)}" autocomplete="off">
      ${state.searchQuery ? `<div class="search-info">Kết quả: ${state.shuffledQuestions.length} câu</div>` : ''}
    </div>

    <div class="chapter-filter">
      <button class="chapter-btn ${state.selectedChapter === null && state.bookmarks.length === 0 ? 'active' : ''}" onclick="filterByChapter(null)">Tất cả <span class="chapter-count">(${state.allQuestions.length})</span></button>
      ${chapters.map(c => `
        <button class="chapter-btn ${state.selectedChapter === c ? 'active' : ''}" onclick="filterByChapter(${c})">${chapterNames[c] || 'C'+c} <span class="chapter-count">(${counts[c]})</span></button>
      `).join('')}
      ${state.bookmarks.length > 0 ? `
        <button class="chapter-btn ${state.selectedChapter === null && !state.searchQuery ? 'active' : ''}" onclick="filterBookmarks()" style="border-color:var(--star-color);">⭐ <span class="chapter-count">(${state.bookmarks.length})</span></button>
      ` : ''}
    </div>

    <div class="chapter-progress">
      ${chapters.map(c => {
        const cp = chapterProgress(c);
        const pct = cp.total > 0 ? Math.round((cp.answered / cp.total) * 100) : 0;
        return `
          <div class="cp-item" onclick="filterByChapter(${c})" title="${chapterNames[c] || 'C'+c}: ${cp.answered}/${cp.total}">
            <span class="cp-label">C${c}</span>
            <div class="cp-bar"><div class="cp-fill" style="width:${pct}%"></div></div>
            <span class="cp-pct">${pct}%</span>
          </div>
        `;
      }).join('')}
    </div>
  `;

  // Cache DOM refs for mutations
  dom.statAnswered = document.getElementById('stat-answered');
  dom.statCorrect = document.getElementById('stat-correct');
  dom.statWrong = document.getElementById('stat-wrong');
  dom.progressFill = document.getElementById('progress-fill');
}

function updateChromeStats() {
  const stats = calculateStats();
  const total = state.shuffledQuestions.length;
  if (dom.statAnswered) dom.statAnswered.textContent = `${stats.answered}/${total}`;
  if (dom.statCorrect) dom.statCorrect.textContent = stats.correct;
  if (dom.statWrong) dom.statWrong.textContent = stats.wrong;
  if (dom.progressFill) dom.progressFill.style.width = `${total > 0 ? (stats.answered/total)*100 : 0}%`;
}

// ── RENDER: QUESTION AREA ──
function renderQuestionArea() {
  const area = document.getElementById('question-area');
  if (!area) return;

  if (state.shuffledQuestions.length === 0) {
    area.innerHTML = '<div class="error">Không tìm thấy câu hỏi nào phù hợp.</div>';
    return;
  }

  if (state.quizComplete) { renderQuizResult(area); return; }

  const q = state.shuffledQuestions[state.currentIndex];
  if (!q) { area.innerHTML = '<div class="error">Lỗi: không có câu hỏi.</div>'; return; }

  const total = state.shuffledQuestions.length;
  const isBookmarked = state.bookmarks.includes(q.id);

  if (state.mode === 'flash') {
    renderFlashcard(area, q, total, isBookmarked);
  } else if (state.mode === 'quiz') {
    renderQuiz(area, q, total, isBookmarked);
  } else {
    renderStudy(area, q, total, isBookmarked);
  }
}

function renderStudy(area, q, total, isBookmarked) {
  const isAnswered = state.answers[q.id] !== undefined && state.answers[q.id] !== 'viewed';
  const userAnswer = state.answers[q.id];

  area.innerHTML = `
    <div class="question-card">
      <div class="question-header">
        <div class="question-id">Câu ${q.number} — ${chapterNames[q.chapter] || 'C'+q.chapter}</div>
        <button class="bookmark-btn ${isBookmarked ? 'bookmarked' : ''}" onclick="event.stopPropagation(); toggleBookmark('${q.id}')" title="${isBookmarked ? 'Bỏ đánh dấu' : 'Đánh dấu'}">${isBookmarked ? '★' : '☆'}</button>
      </div>
      <div class="question-text">${escapeHtml(q.question)}</div>
      <div class="options">
        ${q.options.map(opt => {
          const cls = optionClass(opt.label, q.answer, userAnswer, isAnswered);
          const click = !isAnswered ? `onclick="selectAnswer('${opt.label}')"` : '';
          return `<button class="option${cls}" ${click}><span class="option-letter">${opt.label}</span>${escapeHtml(opt.text)}</button>`;
        }).join('')}
      </div>
      ${isAnswered && userAnswer !== q.answer ? `<div style="margin-top:12px;font-size:0.85rem;color:var(--danger);">Đáp án đúng: <strong>${q.answer}</strong></div>` : ''}
      ${isAnswered && userAnswer === q.answer ? `<div style="margin-top:12px;font-size:0.85rem;color:var(--primary);">Chính xác! ✅</div>` : ''}
    </div>

    <div class="nav-controls">
      <button class="nav-btn" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''}>← Câu trước</button>
      <span style="color:var(--text-dim);font-size:0.8rem;">${state.currentIndex + 1}/${total}</span>
      <button class="nav-btn" onclick="nextQuestion()" ${state.currentIndex === total - 1 ? 'disabled' : ''}>Câu sau →</button>
    </div>
  `;
}

function renderFlashcard(area, q, total, isBookmarked) {
  const isRevealed = state.answers[q.id] !== undefined;

  area.innerHTML = `
    <div class="question-card">
      <div class="question-header">
        <div class="question-id">Câu ${q.number} — ${chapterNames[q.chapter] || 'C'+q.chapter}</div>
        <button class="bookmark-btn ${isBookmarked ? 'bookmarked' : ''}" onclick="event.stopPropagation(); toggleBookmark('${q.id}')" title="${isBookmarked ? 'Bỏ đánh dấu' : 'Đánh dấu'}">${isBookmarked ? '★' : '☆'}</button>
      </div>
      <div class="question-text">${escapeHtml(q.question)}</div>
      ${!isRevealed ? `
        <button class="btn btn-primary" onclick="toggleAnswer()" style="width:100%;margin-top:8px;">👆 Nhấn để xem đáp án</button>
      ` : `
        <div class="options" style="margin-top:12px;">
          ${q.options.filter(o => o.label === q.answer).map(o => `
            <div class="option correct disabled"><span class="option-letter">${o.label}</span>${escapeHtml(o.text)}</div>
          `).join('')}
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="markWrong()">😕 Chưa nhớ</button>
          <button class="btn btn-primary" onclick="markCorrect()">🧠 Nhớ rồi</button>
        </div>
      `}
    </div>

    <div class="nav-controls">
      <button class="nav-btn" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''}>← Câu trước</button>
      <span style="color:var(--text-dim);font-size:0.8rem;">${state.currentIndex + 1}/${total}</span>
      <button class="nav-btn" onclick="nextQuestion()" ${state.currentIndex === total - 1 ? 'disabled' : ''}>Câu sau →</button>
    </div>
  `;
}

function renderQuiz(area, q, total, isBookmarked) {
  const elapsed = state.quizElapsed + (state.quizStartTime ? Math.floor((Date.now() - state.quizStartTime) / 1000) : 0);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  area.innerHTML = `
    ${state.quizStartTime ? `<div class="timer-display">⏱ ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>` : ''}
    <div class="question-card">
      <div class="question-header">
        <div class="question-id">Câu ${q.number} — ${chapterNames[q.chapter] || 'C'+q.chapter}</div>
        <button class="bookmark-btn ${isBookmarked ? 'bookmarked' : ''}" onclick="event.stopPropagation(); toggleBookmark('${q.id}')" title="${isBookmarked ? 'Bỏ đánh dấu' : 'Đánh dấu'}">${isBookmarked ? '★' : '☆'}</button>
      </div>
      <div class="question-text">${escapeHtml(q.question)}</div>
      <div class="options">
        ${q.options.map(opt => {
          const cls = state.selectedAnswer === opt.label ? ' disabled' : '';
          const click = !state.selectedAnswer ? `onclick="selectQuizAnswer('${opt.label}')"` : '';
          return `<button class="option${cls}" ${click}><span class="option-letter">${opt.label}</span>${escapeHtml(opt.text)}</button>`;
        }).join('')}
      </div>
    </div>
    ${state.selectedAnswer ? `
    <div class="btn-group">
      <button class="btn btn-primary" onclick="nextQuestion()">${state.currentIndex < total - 1 ? 'Tiếp tục →' : 'Xem kết quả'}</button>
    </div>` : ''}
    <div class="nav-controls">
      <button class="nav-btn" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''}>← Câu trước</button>
      <span style="color:var(--text-dim);font-size:0.8rem;">${state.currentIndex + 1}/${total}</span>
      ${state.currentIndex < total - 1 ? `<button class="nav-btn" onclick="nextQuestion()" ${!state.selectedAnswer ? 'disabled' : ''}>Câu sau →</button>` : ''}
    </div>
  `;
}

function renderQuizResult(area) {
  const total = state.shuffledQuestions.length;
  const qMap = {};
  state.allQuestions.forEach(q => { qMap[q.id] = q; });
  let correct = 0;
  state.shuffledQuestions.forEach(q => {
    if (state.answers[q.id] && state.answers[q.id] === q.answer) correct++;
  });
  const wrong = total - correct;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 70;
  const elapsed = state.quizElapsed + (state.quizStartTime ? Math.floor((Date.now() - state.quizStartTime) / 1000) : 0);

  // Per-chapter breakdown
  const chStats = {};
  state.shuffledQuestions.forEach(q => {
    const ch = q.chapter;
    if (!chStats[ch]) chStats[ch] = { total: 0, correct: 0 };
    chStats[ch].total++;
    if (state.answers[q.id] && state.answers[q.id] === q.answer) chStats[ch].correct++;
  });

  area.innerHTML = `
    <div class="question-card result-card">
      <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:4px;color:${passed ? 'var(--primary)' : 'var(--warning)'}">${passed ? '🎉 Chúc mừng!' : '💪 Cần cố gắng thêm!'}</div>
      <div class="result-detail">${correct}/${total} câu đúng</div>
      ${elapsed > 0 ? `<div class="result-detail">⏱ ${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}</div>` : ''}

      <div class="result-breakdown">
        ${Object.entries(chStats).sort(([a],[b]) => a - b).map(([ch, s]) => `
          <div class="rb-row">
            <span>${chapterNames[ch] || 'Chương '+ch}</span>
            <span style="color:${s.total>0&&s.correct/s.total>=0.7?'var(--primary)':'var(--danger)'}">${s.correct}/${s.total} (${s.total>0?Math.round(s.correct/s.total*100):0}%)</span>
          </div>
        `).join('')}
      </div>

      <div class="btn-group" style="flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="reviewWrongAnswers()" ${state.wrongAnswerIds.length === 0 ? 'disabled' : ''}>🔄 Ôn câu sai (${state.wrongAnswerIds.length})</button>
        <button class="btn btn-secondary" onclick="retakeQuiz()">📝 Làm lại</button>
        <button class="btn btn-secondary" onclick="switchMode('study')">📖 Chế độ học</button>
      </div>
    </div>
  `;
}

// ── HELPERS ──
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function optionClass(label, correctAnswer, userAnswer, isAnswered) {
  if (!isAnswered) return '';
  if (label === correctAnswer) return ' correct disabled';
  if (label === userAnswer && userAnswer !== correctAnswer) return ' wrong disabled';
  return ' disabled';
}

// ── ACTIONS ──
function selectAnswer(letter) {
  const q = state.shuffledQuestions[state.currentIndex];
  if (!q || state.answers[q.id]) return;
  state.answers[q.id] = letter;
  saveState();
  renderQuestionArea();
  updateChromeStats();
}

function selectQuizAnswer(letter) {
  const q = state.shuffledQuestions[state.currentIndex];
  if (!q || state.selectedAnswer) return;
  state.selectedAnswer = letter;
  state.answers[q.id] = letter;
  if (letter !== q.answer) {
    if (!state.wrongAnswerIds.includes(q.id)) state.wrongAnswerIds.push(q.id);
  }
  saveState();
  renderQuestionArea();
  updateChromeStats();
}

function toggleAnswer() {
  const q = state.shuffledQuestions[state.currentIndex];
  if (!q) return;
  if (state.answers[q.id] === undefined) {
    state.answers[q.id] = 'viewed';
    saveState();
    renderQuestionArea();
    updateChromeStats();
  }
}

function markCorrect() {
  const q = state.shuffledQuestions[state.currentIndex];
  if (!q) return;
  if (!state.answers[q.id] || state.answers[q.id] === 'viewed') {
    state.answers[q.id] = q.answer;
    saveState();
    updateChromeStats();
  }
  nextQuestion();
}

function markWrong() {
  const q = state.shuffledQuestions[state.currentIndex];
  if (!q) return;
  if (!state.answers[q.id] || state.answers[q.id] === 'viewed') {
    state.answers[q.id] = 'wrong';
    saveState();
    updateChromeStats();
  }
  nextQuestion();
}

function toggleBookmark(qid) {
  const idx = state.bookmarks.indexOf(qid);
  if (idx >= 0) state.bookmarks.splice(idx, 1);
  else state.bookmarks.push(qid);
  saveState();
  renderQuestionArea();
}

// ── NAVIGATION ──
function prevQuestion() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    state.selectedAnswer = null;
    renderQuestionArea();
  }
}

function nextQuestion() {
  if (state.currentIndex < state.shuffledQuestions.length - 1) {
    state.currentIndex++;
    state.selectedAnswer = null;
    renderQuestionArea();
  } else if (state.mode === 'quiz' && !state.quizComplete) {
    state.quizComplete = true;
    state.quizElapsed += state.quizStartTime ? Math.floor((Date.now() - state.quizStartTime) / 1000) : 0;
    state.quizStartTime = null;
    saveState();
    renderQuestionArea();
  }
}

function switchMode(mode) {
  state.mode = mode;
  state.selectedAnswer = null;
  state.currentIndex = 0;
  state.answers = {};
  state.quizComplete = false;
  state.wrongAnswerIds = [];
  state.quizElapsed = 0;
  state.quizStartTime = mode === 'quiz' ? Date.now() : null;
  state.searchQuery = '';
  document.getElementById('search-input').value = '';
  filterByChapter(state.selectedChapter);
  saveState();
}

function retakeQuiz() {
  state.currentIndex = 0;
  state.selectedAnswer = null;
  state.answers = {};
  state.quizComplete = false;
  state.wrongAnswerIds = [];
  state.quizElapsed = 0;
  state.quizStartTime = Date.now();
  state.shuffledQuestions = shuffle(state.filteredQuestions);
  saveState();
  renderChrome();
  renderQuestionArea();
}

function reviewWrongAnswers() {
  if (state.wrongAnswerIds.length === 0) return;
  const qMap = {};
  state.allQuestions.forEach(q => { qMap[q.id] = q; });
  const wrongQs = state.wrongAnswerIds.map(id => qMap[id]).filter(Boolean);
  state.mode = 'study';
  state.shuffledQuestions = shuffle(wrongQs);
  state.filteredQuestions = [...wrongQs];
  state.currentIndex = 0;
  state.answers = {};
  state.quizComplete = false;
  state.searchQuery = '';
  document.getElementById('search-input').value = '';
  saveState();
  renderChrome();
  renderQuestionArea();
}

// ── FILTERS ──
function filterByChapter(chapter) {
  state.selectedChapter = chapter;
  state.searchQuery = '';
  document.getElementById('search-input').value = '';
  if (chapter === null) {
    state.filteredQuestions = state.allQuestions;
  } else {
    state.filteredQuestions = state.allQuestions.filter(q => q.chapter === chapter);
  }
  state.shuffledQuestions = shuffle(state.filteredQuestions);
  state.currentIndex = 0;
  state.selectedAnswer = null;
  renderChrome();
  renderQuestionArea();
  updateChromeStats();
  saveState();
}

function filterBookmarks() {
  state.selectedChapter = null;
  state.searchQuery = '';
  document.getElementById('search-input').value = '';
  const qMap = {};
  state.allQuestions.forEach(q => { qMap[q.id] = q; });
  state.filteredQuestions = state.bookmarks.map(id => qMap[id]).filter(Boolean);
  state.shuffledQuestions = shuffle(state.filteredQuestions);
  state.currentIndex = 0;
  state.selectedAnswer = null;
  renderChrome();
  renderQuestionArea();
  updateChromeStats();
  saveState();
}

const debouncedSearch = debounce(function(term) {
  state.searchQuery = term;
  if (!term || term.trim() === '') {
    filterByChapter(state.selectedChapter);
    return;
  }
  const lower = term.toLowerCase();
  state.filteredQuestions = state.allQuestions.filter(q =>
    q.question.toLowerCase().includes(lower) ||
    q.options.some(o => o.text.toLowerCase().includes(lower))
  );
  state.shuffledQuestions = shuffle(state.filteredQuestions);
  state.currentIndex = 0;
  state.selectedAnswer = null;
  renderChrome();
  renderQuestionArea();
  updateChromeStats();
  saveState();
}, 250);

// ── KEYBOARD ──
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  const q = state.shuffledQuestions[state.currentIndex];

  switch(e.key) {
    case '1': case '2': case '3': case '4':
      e.preventDefault();
      const idx = parseInt(e.key) - 1;
      if (idx < labels.length) {
        if (state.mode === 'study' && q && (!state.answers[q.id] || state.answers[q.id] === 'viewed')) {
          selectAnswer(labels[idx]);
        } else if (state.mode === 'quiz' && q && !state.selectedAnswer) {
          selectQuizAnswer(labels[idx]);
        }
      }
      break;
    case 'ArrowLeft':  e.preventDefault(); prevQuestion(); break;
    case 'ArrowRight': e.preventDefault(); nextQuestion(); break;
    case ' ':
      e.preventDefault();
      if (state.mode === 'quiz' && state.quizComplete) break;
      nextQuestion();
      break;
    case 'f': case 'F':
      if (state.mode === 'flash' && q && state.answers[q.id] === undefined) {
        toggleAnswer();
      }
      break;
  }
});

// ── LOADING ──
async function loadQuestions() {
  const area = document.getElementById('question-area');

  // Try sessionStorage cache first
  try {
    const cached = sessionStorage.getItem('quiz_ktct_cache');
    if (cached) {
      const data = JSON.parse(cached);
      if (Array.isArray(data) && data.length > 0) {
        state.allQuestions = data;
        return true;
      }
    }
  } catch(e) { /* ignore */ }

  // Fetch with timeout
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);

  try {
    const resp = await fetch('data/questions.json', { signal: controller.signal });
    clearTimeout(timeout);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('Empty data');

    // Cache in sessionStorage
    try { sessionStorage.setItem('quiz_ktct_cache', JSON.stringify(data)); } catch(e) { /* quota exceeded */ }

    state.allQuestions = data;
    return true;
  } catch(err) {
    clearTimeout(timeout);
    area.innerHTML = `
      <div class="error">
        <div>⚠️ Không thể tải dữ liệu câu hỏi.</div>
        <div style="font-size:0.8rem;margin-top:4px;">${escapeHtml(err.message)}</div>
        <button class="btn btn-primary retry-btn" onclick="loadQuestions()">🔄 Thử lại</button>
      </div>`;
    return false;
  }
}

// ── BOOT ──
async function boot() {
  // Hydrate from localStorage
  const saved = loadState();
  hydrateState(saved);

  // Load data
  const ok = await loadQuestions();
  if (!ok) return;

  // Apply saved filters
  if (saved && saved.selectedChapter !== undefined) {
    state.selectedChapter = saved.selectedChapter;
    state.filteredQuestions = state.selectedChapter === null
      ? state.allQuestions
      : state.allQuestions.filter(q => q.chapter === state.selectedChapter);
  } else {
    state.filteredQuestions = state.allQuestions;
  }

  state.shuffledQuestions = shuffle(state.filteredQuestions);

  // Restore position if available
  if (saved && saved._restoreIndex !== undefined) {
    state.currentIndex = Math.min(saved._restoreIndex, state.shuffledQuestions.length - 1);
    state.mode = saved._restoreMode || 'study';
  }
  // Start quiz timer if resuming quiz
  if (state.mode === 'quiz' && !state.quizComplete) {
    state.quizStartTime = Date.now();
    setInterval(() => {
      if (state.mode === 'quiz' && state.quizStartTime && !state.quizComplete) {
        renderQuestionArea();
      }
    }, 10000); // Update timer display every 10s
  }

  document.getElementById('question-count').textContent = `${state.allQuestions.length} câu hỏi trắc nghiệm`;

  renderChrome();
  renderQuestionArea();

  // Search input listener
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      debouncedSearch(this.value);
    });
  }

  // Theme toggle
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

  // Keyboard hints toggle
  document.getElementById('kbd-toggle').addEventListener('click', function() {
    const hints = document.getElementById('kbd-hints');
    hints.classList.toggle('hidden');
  });

  // Set initial theme icon
  setTheme(document.documentElement.dataset.theme || 'dark');
}

// ── EXPORT FOR onclick ──
window.selectAnswer = selectAnswer;
window.selectQuizAnswer = selectQuizAnswer;
window.toggleAnswer = toggleAnswer;
window.markCorrect = markCorrect;
window.markWrong = markWrong;
window.toggleBookmark = toggleBookmark;
window.prevQuestion = prevQuestion;
window.nextQuestion = nextQuestion;
window.switchMode = switchMode;
window.retakeQuiz = retakeQuiz;
window.reviewWrongAnswers = reviewWrongAnswers;
window.filterByChapter = filterByChapter;
window.filterBookmarks = filterBookmarks;
window.loadQuestions = loadQuestions;

// ── START ──
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
</script>
