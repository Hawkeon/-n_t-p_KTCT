<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinh Tế Chính Trị Mác - Lênin - Ôn Tập</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f14; color: #e8e8f0; min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 24px 16px; }

    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #a8e6cf; margin-bottom: 8px; }
    header p { color: #888; font-size: 0.875rem; }

    .stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.75rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value.correct { color: #a8e6cf; }
    .stat-value.wrong { color: #ff8b94; }
    .stat-value.total { color: #ffd93d; }

    .progress-bar { background: #1e1e28; border-radius: 8px; height: 8px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, #a8e6cf, #ffd93d); height: 100%; border-radius: 8px; transition: width 0.3s ease; }

    .mode-toggle { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .mode-btn { padding: 8px 16px; border: 1px solid #333; border-radius: 8px; background: transparent; color: #888; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
    .mode-btn.active { background: #1e1e28; color: #e8e8f0; border-color: #a8e6cf; }
    .mode-btn:hover:not(.active) { border-color: #555; }

    .chapter-filter { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .chapter-btn { padding: 6px 12px; border: 1px solid #333; border-radius: 6px; background: transparent; color: #888; cursor: pointer; font-size: 0.75rem; transition: all 0.2s; }
    .chapter-btn.active { background: #1e1e28; color: #e8e8f0; border-color: #a8e6cf; }
    .chapter-btn:hover:not(.active) { border-color: #555; }

    .question-card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .question-id { font-size: 0.75rem; color: #666; margin-bottom: 12px; }
    .question-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .option { padding: 14px 16px; border: 1px solid #333; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; background: transparent; color: #ccc; text-align: left; }
    .option:hover:not(.disabled) { border-color: #555; background: #222; }
    .option.correct { border-color: #a8e6cf; background: rgba(168,230,207,0.1); color: #a8e6cf; }
    .option.wrong { border-color: #ff8b94; background: rgba(255,139,148,0.1); color: #ff8b94; }
    .option.disabled { cursor: default; }
    .option.disabled.correct { border-color: #a8e6cf; }
    .option.disabled.wrong { border-color: #ff8b94; }
    .option-letter { display: inline-block; width: 24px; height: 24px; border-radius: 50%; border: 1px solid currentColor; text-align: center; line-height: 22px; margin-right: 10px; font-size: 0.8rem; }

    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #a8e6cf; color: #0f0f14; }
    .btn-primary:hover { background: #8fd9b3; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }

    .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
    .nav-btn { padding: 8px 16px; border: 1px solid #333; border-radius: 8px; background: transparent; color: #888; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
    .nav-btn:hover { border-color: #555; color: #ccc; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 12px; border: 1px solid #333; border-radius: 6px; background: transparent; color: #888; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .filter-btn.active { background: #1e1e28; color: #e8e8f0; border-color: #a8e6cf; }
    .filter-btn:hover:not(.active) { border-color: #555; }

    .loading { text-align: center; padding: 40px; color: #888; }
    .error { text-align: center; padding: 40px; color: #ff8b94; }

    @media (max-width: 480px) {
      .container { padding: 16px 12px; }
      .question-card { padding: 16px; }
      .stats { gap: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Kinh Tế Chính Trị Mác - Lênin</h1>
      <p id="question-count">Đang tải...</p>
    </header>

    <div id="app">
      <div class="loading">Đang tải câu hỏi...</div>
    </div>
  </div>

  <script>
    const letters = ['A', 'B', 'C', 'D'];

    let state = {
      mode: 'study',
      currentIndex: 0,
      selectedAnswer: null,
      showResult: false,
      answers: {},
      allQuestions: [],
      filteredQuestions: [],
      shuffledQuestions: [],
      selectedChapter: null,
      quizComplete: false,
      wrongAnswers: []
    };

    const chapterNames = {
      1: 'Chương 1: Đối tượng, phương pháp',
      2: 'Chương 2: Hàng hóa, tiền tệ',
      3: 'Chương 3: Giá trị thặng dư',
      4: 'Chương 4: Cạnh tranh, độc quyền',
      5: 'Chương 5: Kinh tế thị trường',
      6: 'Chương 6: Hội nhập kinh tế'
    };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    async function loadQuestions() {
      try {
        const response = await fetch('data/questions.json');
        if (!response.ok) throw new Error('Failed to load');
        const data = await response.json();
        state.allQuestions = data;
        state.filteredQuestions = data;
        state.shuffledQuestions = shuffle(data);
        document.getElementById('question-count').textContent = `${data.length} câu hỏi trắc nghiệm`;
        render();
      } catch (err) {
        document.getElementById('app').innerHTML = '<div class="error">Không thể tải câu hỏi. Vui lòng kiểm tra file data/questions.json</div>';
      }
    }

    function filterByChapter(chapter) {
      state.selectedChapter = chapter;
      if (chapter === null) {
        state.filteredQuestions = state.allQuestions;
      } else {
        state.filteredQuestions = state.allQuestions.filter(q => q.chapter === chapter);
      }
      state.shuffledQuestions = shuffle(state.filteredQuestions);
      state.currentIndex = 0;
      state.answers = {};
      render();
    }

    function render() {
      const app = document.getElementById('app');

      if (state.filteredQuestions.length === 0) {
        app.innerHTML = '<div class="error">Không có câu hỏi</div>';
        return;
      }

      const q = state.shuffledQuestions[state.currentIndex];
      const total = state.shuffledQuestions.length;
      const answered = Object.keys(state.answers).length;
      const correct = Object.values(state.answers).filter((a, i) => {
        const sq = state.shuffledQuestions[i];
        return sq && a === sq.answer;
      }).length;
      const wrong = answered - correct;

      if (state.mode === 'flash') {
        renderFlashcard(app, q, total, answered, correct, wrong);
      } else if (state.mode === 'quiz') {
        renderQuiz(app, q, total, answered, correct, wrong);
      } else {
        renderStudy(app, q, total, answered, correct, wrong);
      }
    }

    function renderStudy(app, q, total, answered, correct, wrong) {
      const isAnswered = state.answers[q.id] !== undefined;
      const userAnswer = state.answers[q.id];

      app.innerHTML = `
        <div class="stats">
          <div class="stat"><div class="stat-value total">${answered}/${total}</div><div class="stat-label">Đã trả lời</div></div>
          <div class="stat"><div class="stat-value correct">${correct}</div><div class="stat-label">Đúng</div></div>
          <div class="stat"><div class="stat-value wrong">${wrong}</div><div class="stat-label">Sai</div></div>
        </div>

        <div class="progress-bar"><div class="progress-fill" style="width:${(answered/total)*100}%"></div></div>

        <div class="mode-toggle">
          <button class="mode-btn active" onclick="setMode('study')">Học</button>
          <button class="mode-btn" onclick="setMode('flash')">Đố ôn</button>
          <button class="mode-btn" onclick="setMode('quiz')">Kiểm tra</button>
        </div>

        <div class="chapter-filter">
          <button class="chapter-btn ${state.selectedChapter === null ? 'active' : ''}" onclick="filterByChapter(null)">Tất cả</button>
          ${[1,2,3,4,5,6].map(c => `
            <button class="chapter-btn ${state.selectedChapter === c ? 'active' : ''}" onclick="filterByChapter(${c})">${c}</button>
          `).join('')}
        </div>

        <div class="question-card">
          <div class="question-id">Câu ${q.number} - Chương ${q.chapter}</div>
          <div class="question-text">${q.question}</div>
          <div class="options">
            ${q.options.map((opt, i) => {
              const letter = opt.label;
              const isUserChoice = userAnswer === letter;
              const isCorrectChoice = q.answer === letter;
              let cls = 'option';
              if (isAnswered) {
                cls += ' disabled';
                if (isCorrectChoice) cls += ' correct';
                else if (isUserChoice && !isCorrectChoice) cls += ' wrong';
              }
              return `<button class="${cls}" onclick="${!isAnswered ? `selectAnswer('${letter}')` : ''}">
                <span class="option-letter">${letter}</span>${opt.text}
              </button>`;
            }).join('')}
          </div>
        </div>

        <div class="nav-controls">
          <button class="nav-btn" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''}>← Câu trước</button>
          <span style="color:#666;font-size:0.8rem;">${state.currentIndex + 1}/${total}</span>
          <button class="nav-btn" onclick="nextQuestion()" ${state.currentIndex === total - 1 ? 'disabled' : ''}>Câu sau →</button>
        </div>
      `;
    }

    function renderFlashcard(app, q, total, answered, correct, wrong) {
      const isAnswered = state.answers[q.id] !== undefined;

      app.innerHTML = `
        <div class="stats">
          <div class="stat"><div class="stat-value total">${answered}/${total}</div><div class="stat-label">Đã ôn</div></div>
          <div class="stat"><div class="stat-value correct">${correct}</div><div class="stat-label">Nhớ</div></div>
          <div class="stat"><div class="stat-value wrong">${wrong}</div><div class="stat-label">Chưa</div></div>
        </div>

        <div class="mode-toggle">
          <button class="mode-btn" onclick="setMode('study')">Học</button>
          <button class="mode-btn active" onclick="setMode('flash')">Đố ôn</button>
          <button class="mode-btn" onclick="setMode('quiz')">Kiểm tra</button>
        </div>

        <div class="chapter-filter">
          <button class="chapter-btn ${state.selectedChapter === null ? 'active' : ''}" onclick="filterByChapter(null)">Tất cả</button>
          ${[1,2,3,4,5,6].map(c => `
            <button class="chapter-btn ${state.selectedChapter === c ? 'active' : ''}" onclick="filterByChapter(${c})">${c}</button>
          `).join('')}
        </div>

        <div class="question-card" onclick="toggleAnswer()">
          <div class="question-id">Câu ${q.number} - Chương ${q.chapter}</div>
          <div class="question-text">${q.question}</div>
          ${!isAnswered ? '<div style="color:#666;font-size:0.875rem;margin-top:12px;">Nhấn để xem đáp án</div>' : `
          <div class="options" style="margin-top:16px;">
            ${q.options.filter(opt => opt.label === q.answer).map(opt => `
              <div class="option correct disabled"><span class="option-letter">${opt.label}</span>${opt.text}</div>
            `).join('')}
          </div>
          `}
        </div>

        <div class="btn-group">
          <button class="btn btn-secondary" onclick="markWrong()">Chưa nhớ</button>
          <button class="btn btn-primary" onclick="markCorrect()">Nhớ rồi</button>
        </div>

        <div class="nav-controls">
          <button class="nav-btn" onclick="prevQuestion()" ${state.currentIndex === 0 ? 'disabled' : ''}>← Câu trước</button>
          <span style="color:#666;font-size:0.8rem;">${state.currentIndex + 1}/${total}</span>
          <button class="nav-btn" onclick="nextQuestion()" ${state.currentIndex === total - 1 ? 'disabled' : ''}>Câu sau →</button>
        </div>
      `;
    }

    function renderQuiz(app, q, total, answered, correct, wrong) {
      if (state.quizComplete) {
        renderQuizResult(app, total, correct, wrong);
        return;
      }
      app.innerHTML = `
        <div class="stats">
          <div class="stat"><div class="stat-value total">${answered + 1}/${total}</div><div class="stat-label">Câu hỏi</div></div>
          <div class="stat"><div class="stat-value correct">${correct}</div><div class="stat-label">Đúng</div></div>
          <div class="stat"><div class="stat-value wrong">${wrong}</div><div class="stat-label">Sai</div></div>
        </div>

        <div class="progress-bar"><div class="progress-fill" style="width:${((answered)/total)*100}%"></div></div>

        <div class="mode-toggle">
          <button class="mode-btn" onclick="setMode('study')">Học</button>
          <button class="mode-btn" onclick="setMode('flash')">Đố ôn</button>
          <button class="mode-btn active" onclick="setMode('quiz')">Kiểm tra</button>
        </div>

        <div class="chapter-filter">
          <button class="chapter-btn ${state.selectedChapter === null ? 'active' : ''}" onclick="filterByChapter(null)">Tất cả</button>
          ${[1,2,3,4,5,6].map(c => `
            <button class="chapter-btn ${state.selectedChapter === c ? 'active' : ''}" onclick="filterByChapter(${c})">${c}</button>
          `).join('')}
        </div>

        <div class="question-card">
          <div class="question-id">Câu ${q.number} - Chương ${q.chapter}</div>
          <div class="question-text">${q.question}</div>
          <div class="options">
            ${q.options.map((opt, i) => {
              const letter = opt.label;
              return `<button class="option" onclick="selectQuizAnswer('${letter}')">
                <span class="option-letter">${letter}</span>${opt.text}
              </button>`;
            }).join('')}
          </div>
        </div>

        ${state.selectedAnswer ? `
        <div class="btn-group">
          <button class="btn btn-primary" onclick="nextQuestion()">Tiếp tục</button>
        </div>
        ` : ''}
      `;
    }

    function selectAnswer(letter) {
      state.answers[state.shuffledQuestions[state.currentIndex].id] = letter;
      render();
    }

    function selectQuizAnswer(letter) {
      state.selectedAnswer = letter;
      const q = state.shuffledQuestions[state.currentIndex];
      state.answers[q.id] = letter;
      if (letter !== q.answer) {
        if (!state.wrongAnswers.find(w => w.id === q.id)) {
          state.wrongAnswers.push(q);
        }
      }
      render();
    }

    function toggleAnswer() {
      const q = state.shuffledQuestions[state.currentIndex];
      if (state.answers[q.id] === undefined) {
        state.answers[q.id] = 'viewed';
      }
      render();
    }

    function markCorrect() {
      const q = state.shuffledQuestions[state.currentIndex];
      state.answers[q.id] = q.answer;
      nextQuestion();
    }

    function markWrong() {
      const q = state.shuffledQuestions[state.currentIndex];
      state.answers[q.id] = 'wrong';
      nextQuestion();
    }

    function renderQuizResult(app, total, correct, wrong) {
      const percentage = Math.round((correct / total) * 100);
      const passed = percentage >= 70;
      app.innerHTML = `
        <div class="question-card" style="text-align:center;">
          <h2 style="margin-bottom:16px;color:${passed ? '#a8e6cf' : '#ff8b94'}">${passed ? 'Chúc mừng!' : 'Cần cố gắng thêm!'}</h2>
          <div style="font-size:3rem;font-weight:700;color:${passed ? '#a8e6cf' : '#ffd93d'};margin-bottom:8px;">${percentage}%</div>
          <p style="color:#888;margin-bottom:24px;">${correct}/${total} câu đúng</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
            <button class="btn btn-primary" onclick="reviewWrongAnswers()" ${state.wrongAnswers.length === 0 ? 'disabled' : ''}>Ôn lại câu sai (${state.wrongAnswers.length})</button>
            <button class="btn btn-secondary" onclick="setMode('quiz')">Làm lại bài kiểm tra</button>
            <button class="btn btn-secondary" onclick="setMode('study')">Chế độ học</button>
          </div>
        </div>
      `;
    }

    function reviewWrongAnswers() {
      if (state.wrongAnswers.length === 0) return;
      state.mode = 'study';
      state.shuffledQuestions = [...state.wrongAnswers];
      state.filteredQuestions = [...state.wrongAnswers];
      state.currentIndex = 0;
      state.answers = {};
      state.quizComplete = false;
      render();
    }

    function setMode(mode) {
      state.mode = mode;
      state.selectedAnswer = null;
      state.currentIndex = 0;
      state.answers = {};
      state.quizComplete = false;
      state.wrongAnswers = [];
      state.shuffledQuestions = shuffle(state.filteredQuestions);
      render();
    }

    function prevQuestion() {
      if (state.currentIndex > 0) {
        state.currentIndex--;
        state.selectedAnswer = null;
        render();
      }
    }

    function nextQuestion() {
      if (state.currentIndex < state.shuffledQuestions.length - 1) {
        state.currentIndex++;
        state.selectedAnswer = null;
        render();
      } else if (state.mode === 'quiz' && !state.quizComplete) {
        state.quizComplete = true;
        render();
      }
    }

    loadQuestions();
  </script>
</body>
</html>
